name: Production Build & Submit

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Android Production
    type: build
    params:
      platform: android
      profile: production

  submit:
    name: Submit to Google Play
    type: submit
    needs: [build]
    params:
      build_id: ${{ needs.build.outputs.build_id }}
