name: Production Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  build:
    name: Build Android Production
    type: build
    env:
      APP_VERSION_FROM_TAG: ${{ github.ref_name }}
    params:
      platform: android
      profile: production

  submit:
    name: Submit to Google Play
    type: submit
    needs: [build]
    params:
      build_id: ${{ needs.build.outputs.build_id }}

  summary:
    name: Build Summary
    type: doc
    after: [build, submit]
    params:
      md: |
        ## Production Build Summary
        - Profile: `${{ needs.build.outputs.profile }}`
        - Version: `${{ needs.build.outputs.app_version || 'missing' }}`
        - Runtime version: `${{ needs.build.outputs.runtime_version || 'missing' }}`
        - Build version: `${{ needs.build.outputs.app_build_version || 'missing' }}`
        - Build ID: `${{ needs.build.outputs.build_id || 'missing' }}`
        - Submit status: `${{ after.submit.status }}`
