name: Production Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    name: Build Android Production
    type: build
    env:
      APP_VERSION_FROM_TAG: ${{ github.ref_name }}
    params:
      platform: android
      profile: production

  submit:
    name: Submit to Google Play
    type: submit
    needs: [build]
    params:
      build_id: ${{ needs.build.outputs.build_id }}
