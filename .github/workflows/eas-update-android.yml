name: EAS Update Android Production

on:
  workflow_dispatch:
    inputs:
      update_message:
        description: 'Message pour eas update'
        required: false
        default: 'Mise à jour production'

jobs:
  eas-update-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Switch platform imports to native
        run: node scripts/switch-platform.js native

      - name: Run EAS Update (Android)
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        run: eas update --platform android --message "${{ github.event.inputs.update_message || 'Mise à jour production' }}"
