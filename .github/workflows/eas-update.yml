name: EAS Update

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform (android, ios, all)'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      eas_channel:
        description: 'EAS Profile (development, preview, production)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development
      app_version:
        description: 'App version (e.g., 1.0.5)'
        required: true
        default: '1.0.4'
        type: string
      update_message:
        description: 'Message pour eas update'
        required: false
        default: 'Mise à jour'
      update_web:
        description: 'Mettre à jour la version web (true/false)'
        required: false
        default: false
        type: boolean
      send_push_notification:
        description: 'Envoyer une notification push aux utilisateurs'
        required: false
        default: false
        type: boolean
      notification_message:
        description: 'Message de notification push (optionnel)'
        required: false
        default: 'Nouvelle mise à jour disponible ! Découvrez les nouveautés.'
        type: string

jobs:
  eas-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21.7.3'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Update app version
        run: node scripts/update-version.js "${{ github.event.inputs.app_version }}"

      - name: Switch platform imports to native
        run: node scripts/switch-platform.js native

      - name: Run EAS Update
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.platform }}" = "all" ]; then
            echo "Running EAS update for all platforms..."
            eas update --platform all --channel "${{ github.event.inputs.eas_channel }}" --message "${{ github.event.inputs.update_message || 'Mise à jour' }}"
          else
            echo "Running EAS update for ${{ github.event.inputs.platform }} platform..."
            eas update --platform "${{ github.event.inputs.platform }}" --channel "${{ github.event.inputs.eas_channel }}" --message "${{ github.event.inputs.update_message || 'Mise à jour' }}"
          fi

      - name: Send Push Notification
        if: ${{ github.event.inputs.send_push_notification == 'true' && github.event.inputs.eas_channel == 'production' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOTIFICATION_MESSAGE: ${{ github.event.inputs.notification_message || 'Nouvelle mise à jour disponible ! Découvrez les nouveautés.' }}
        run: |
          echo "Sending push notification to production users..."
          cd scripts
          npm install
          node sendPushNotifications.js


  eas-update-web:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.update_web == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21.7.3'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Switch platform imports to web
        run: node scripts/switch-platform.js web

      - name: Update app version for web
        run: node scripts/update-version.js "${{ github.event.inputs.app_version }}"

      - name: Build web version
        run: yarn build:web

      - name: Deploy web version
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.eas_channel }}" = "production" ]; then
            yarn deploy:web:prod
          else
            yarn deploy:web
          fi

