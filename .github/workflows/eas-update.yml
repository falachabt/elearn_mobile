name: EAS Update

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform (android, ios, all)'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      eas_profile:
        description: 'EAS Profile (development, preview, production)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development
      app_version:
        description: 'App version (e.g., 1.0.5)'
        required: true
        default: '1.0.4'
        type: string
      update_message:
        description: 'Message pour eas update'
        required: false
        default: 'Mise à jour'

jobs:
  eas-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21.7.3'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Update app version
        run: node scripts/update-version.js "${{ github.event.inputs.app_version }}"

      - name: Switch platform imports to native
        run: node scripts/switch-platform.js native

      - name: Run EAS Update
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.platform }}" = "all" ]; then
            echo "Running EAS update for all platforms..."
            eas update --platform all --profile "${{ github.event.inputs.eas_profile }}" --message "${{ github.event.inputs.update_message || 'Mise à jour' }}"
          else
            echo "Running EAS update for ${{ github.event.inputs.platform }} platform..."
            eas update --platform "${{ github.event.inputs.platform }}" --profile "${{ github.event.inputs.eas_profile }}" --message "${{ github.event.inputs.update_message || 'Mise à jour' }}"
          fi
